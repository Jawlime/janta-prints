<svg xmlns="http://www.w3.org/2000/svg" viewBox="-0.59 0 63.885 63.885">
  <!-- Simplified fillable version of the Lukas Jurik hoodie -->
  <!-- Left body panel -->
  <path id="product-body" fill="#ffffff" stroke="#cccccc" stroke-width="0.5"
    d="M 8 19 L 0.5 55 L 6 56 L 13 26 Z
       M 54.7 19 L 62.2 55 L 56.7 56 L 49.7 26 Z
       M 13 26 L 13 63 L 49.7 63 L 49.7 26 Z
       M 8 19 C 10 12 16 7 20 5 C 18 8 17 14 17 19 Z
       M 54.7 19 C 52.7 12 46.7 7 42.7 5 C 44.7 8 45.7 14 45.7 19 Z"/>
  <!-- Hood -->
  <path id="product-hood" fill="#f0f0f0" stroke="#cccccc" stroke-width="0.5"
    d="M 17 19 C 17 19 18 6 22 3 C 26 0 36.5 0 40.5 3 C 44.5 6 45.7 19 45.7 19
       C 41 22 36 23 31.5 23 C 27 23 22 22 17 19 Z"/>
  <!-- Hood opening (dark ellipse) -->
  <ellipse cx="31.5" cy="13" rx="6" ry="9" fill="#111111" opacity="0.85"/>
  <!-- Pocket -->
  <rect id="product-collar" x="17" y="47" width="28" height="11" rx="1"
    fill="#e0e0e0" stroke="#cccccc" stroke-width="0.4"/>
  <line x1="31.5" y1="47" x2="31.5" y2="58" stroke="#cccccc" stroke-width="0.4"/>
  <!-- Drawstrings -->
  <line x1="29" y1="10" x2="27.5" y2="23" stroke="#888888" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="34" y1="10" x2="35.5" y2="23" stroke="#888888" stroke-width="0.8" stroke-linecap="round"/>
</svg>