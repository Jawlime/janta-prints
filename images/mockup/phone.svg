<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 480" width="260" height="480">
  <defs>
    <filter id="phone-shadow">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#000" flood-opacity="0.20"/>
    </filter>
  </defs>
  <g filter="url(#phone-shadow)">
    <!-- Case body -->
    <rect class="product-fill" x="20" y="20" width="220" height="440" rx="32"
      fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
    <!-- Camera bump -->
    <rect x="140" y="35" width="80" height="75" rx="16" fill="#e8e8e8" stroke="#d8d8d8" stroke-width="1"/>
    <!-- Camera lenses -->
    <circle cx="165" cy="60" r="18" fill="#2a2a2a"/>
    <circle cx="165" cy="60" r="12" fill="#1a1a1a"/>
    <circle cx="165" cy="60" r="5" fill="#3a3a3a"/>
    <circle cx="200" cy="60" r="18" fill="#2a2a2a"/>
    <circle cx="200" cy="60" r="12" fill="#1a1a1a"/>
    <circle cx="200" cy="60" r="5" fill="#3a3a3a"/>
    <circle cx="165" cy="95" r="12" fill="#2a2a2a"/>
    <circle cx="165" cy="95" r="7" fill="#1a1a1a"/>
    <!-- Flash -->
    <circle cx="200" cy="92" r="8" fill="#d4a800" opacity="0.8"/>
    <!-- Screen area -->
    <rect x="30" y="130" width="200" height="300" rx="20" fill="#f0f0f0" stroke="#e0e0e0" stroke-width="1"/>
    <!-- Side buttons -->
    <rect x="16" y="140" width="6" height="40" rx="3" fill="#d0d0d0"/>
    <rect x="16" y="195" width="6" height="30" rx="3" fill="#d0d0d0"/>
    <rect x="238" y="160" width="6" height="50" rx="3" fill="#d0d0d0"/>
  </g>
</svg>