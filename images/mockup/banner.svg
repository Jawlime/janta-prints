<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 540" width="300" height="540">
  <defs>
    <filter id="banner-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <g filter="url(#banner-shadow)">
    <!-- Banner body -->
    <rect class="product-fill" x="20" y="10" width="260" height="460" rx="3"
      fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
    <!-- Top bar -->
    <rect x="15" y="6" width="270" height="12" rx="3" fill="#c0c0c0"/>
    <!-- Pole -->
    <rect x="146" y="470" width="8" height="50" rx="2" fill="#b0b0b0"/>
    <!-- Base -->
    <ellipse cx="150" cy="520" rx="55" ry="10" fill="#c0c0c0"/>
    <ellipse cx="150" cy="518" rx="50" ry="7" fill="#d0d0d0"/>
    <!-- Subtle edge shadows -->
    <rect x="20" y="10" width="10" height="460" rx="2" fill="rgba(0,0,0,0.04)"/>
    <rect x="270" y="10" width="10" height="460" rx="2" fill="rgba(0,0,0,0.03)"/>
  </g>
</svg>