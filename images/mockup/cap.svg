<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <defs>
    <filter id="cap-shadow">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <g filter="url(#cap-shadow)">
    <!-- Crown panels - 6 panel cap -->
    <!-- Panel 1 (front left) -->
    <path class="product-fill" d="M 200 30 L 120 160 L 200 180 Z" fill="#f0f0f0" stroke="#d8d8d8" stroke-width="1"/>
    <!-- Panel 2 (front right) -->
    <path class="product-fill" d="M 200 30 L 280 160 L 200 180 Z" fill="#ffffff" stroke="#d8d8d8" stroke-width="1"/>
    <!-- Panel 3 (side left) -->
    <path class="product-fill" d="M 120 160 L 80 150 L 110 80 L 200 30 Z" fill="#ebebeb" stroke="#d8d8d8" stroke-width="1"/>
    <!-- Panel 4 (side right) -->
    <path class="product-fill" d="M 280 160 L 320 150 L 290 80 L 200 30 Z" fill="#f5f5f5" stroke="#d8d8d8" stroke-width="1"/>
    <!-- Back panels -->
    <path class="product-fill" d="M 80 150 L 110 80 L 200 30 L 290 80 L 320 150 L 200 180 Z"
      fill="none" stroke="#d0d0d0" stroke-width="1"/>
    <!-- Button top -->
    <circle cx="200" cy="30" r="8" fill="#d0d0d0" stroke="#bbb" stroke-width="1"/>
    <!-- Sweatband -->
    <ellipse cx="200" cy="178" rx="120" ry="18" fill="#d8d8d8" stroke="#c0c0c0" stroke-width="1"/>
    <!-- Brim -->
    <path class="product-fill" d="M 80 175 Q 200 230 320 175 Q 310 210 200 225 Q 90 210 80 175 Z"
      fill="#e8e8e8" stroke="#ccc" stroke-width="1"/>
    <!-- Brim underside -->
    <path d="M 82 180 Q 200 228 318 180 Q 310 206 200 220 Q 90 206 82 180 Z"
      fill="#c8c8c8" opacity="0.5"/>
    <!-- Seam lines -->
    <line x1="200" y1="30" x2="200" y2="180" stroke="rgba(0,0,0,0.08)" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="110" y1="80" x2="120" y2="160" stroke="rgba(0,0,0,0.06)" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="290" y1="80" x2="280" y2="160" stroke="rgba(0,0,0,0.06)" stroke-width="1" stroke-dasharray="3,3"/>
  </g>
</svg>