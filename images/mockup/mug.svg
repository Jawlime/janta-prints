<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380" width="400" height="380">
  <defs>
    <filter id="mug-shadow">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#000" flood-opacity="0.20"/>
    </filter>
    <clipPath id="mug-clip">
      <path d="M 60 60 L 68 310 Q 68 330 90 330 L 270 330 Q 292 330 292 310 L 300 60 Z"/>
    </clipPath>
  </defs>
  <g filter="url(#mug-shadow)">
    <!-- Mug body -->
    <path class="product-fill" d="M 60 60 L 68 310 Q 68 330 90 330 L 270 330 Q 292 330 292 310 L 300 60 Z"
      fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
    <!-- Rim -->
    <ellipse cx="180" cy="60" rx="120" ry="16" fill="#f0f0f0" stroke="#ddd" stroke-width="1.5"/>
    <!-- Handle -->
    <path d="M 292 130 Q 360 130 360 200 Q 360 270 292 270"
      fill="none" stroke="#e0e0e0" stroke-width="28" stroke-linecap="round"/>
    <path d="M 292 130 Q 355 130 355 200 Q 355 270 292 270"
      fill="none" stroke="#f5f5f5" stroke-width="18" stroke-linecap="round"/>
    <!-- Left shadow curve -->
    <path d="M 60 60 L 68 310" stroke="rgba(0,0,0,0.07)" stroke-width="12" stroke-linecap="round"/>
    <!-- Bottom ellipse -->
    <ellipse cx="180" cy="322" rx="112" ry="10" fill="#e8e8e8" stroke="#d8d8d8" stroke-width="1"/>
  </g>
</svg>