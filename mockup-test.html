<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup Test</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a1a; color: #eee; font-family: Arial, sans-serif; display: flex; gap: 20px; padding: 20px; min-height: 100vh; }

/* ── CANVAS AREA ── */
#mockup-stage {
  width: 500px;
  flex-shrink: 0;
  background: #f0f0f0;
  border-radius: 12px;
  position: relative;
  overflow: hidden;
}
#mockup-stage canvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* ── CONTROLS ── */
#controls {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.ctrl-section { background: #2a2a2a; border-radius: 8px; padding: 16px; }
.ctrl-label { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #888; margin-bottom: 10px; }
select, button { width: 100%; padding: 9px 12px; border-radius: 6px; border: 1px solid #444; background: #333; color: #eee; font-size: 13px; cursor: pointer; }
select:focus, button:focus { outline: none; border-color: #e8622a; }
button { background: #e8622a; border-color: #e8622a; color: white; font-weight: 600; margin-top: 4px; }
button.secondary { background: #333; border-color: #555; color: #eee; font-weight: 400; }
.swatch-row { display: flex; gap: 8px; }
.swatch { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: border-color .15s; }
.swatch.active { border-color: #e8622a; }
.swatch:hover { border-color: #888; }
.sample-btn { padding: 8px 12px; border-radius: 6px; border: 1px solid #444; background: #333; color: #eee; font-size: 12px; cursor: pointer; text-align: left; width: 100%; margin-bottom: 5px; }
.sample-btn:hover, .sample-btn.active { border-color: #e8622a; background: rgba(232,98,42,0.1); }
.upload-btn { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border: 1px dashed #555; border-radius: 8px; color: #e8622a; font-size: 12px; cursor: pointer; background: none; }
.upload-btn:hover { border-color: #e8622a; }
.upload-btn input { display: none; }
#status { font-size: 11px; color: #888; margin-top: 4px; min-height: 16px; }
</style>
</head>
<body>

<!-- ── STAGE ─────────────────────────────────────────────── -->
<div id="mockup-stage">
  <canvas id="mc" width="500" height="500"></canvas>
</div>

<!-- ── CONTROLS ──────────────────────────────────────────── -->
<div id="controls">

  <div class="ctrl-section">
    <div class="ctrl-label">Product</div>
    <select id="productSel" onchange="selectProduct(this.value)">
      <option value="tshirt">T-Shirt (Front)</option>
      <option value="hoodie">Hoodie</option>
      <option value="jersey">Football Jersey</option>
      <option value="cap">Cap / Hat</option>
      <option value="tote">Tote Bag</option>
      <option value="mug">Mug</option>
      <option value="banner">Pull-up Banner</option>
      <option value="flyer">A4 Flyer</option>
    </select>
  </div>

  <div class="ctrl-section" id="colorSection">
    <div class="ctrl-label">Colour</div>
    <div class="swatch-row" id="swatchRow"></div>
  </div>

  <div class="ctrl-section">
    <div class="ctrl-label">Sample Designs</div>
    <button class="sample-btn" onclick="applySample(0)">🔤 Bold Text Logo</button>
    <button class="sample-btn" onclick="applySample(1)">🔵 Circle Badge</button>
    <button class="sample-btn" onclick="applySample(2)">🛡️ Shield Logo</button>
  </div>

  <div class="ctrl-section">
    <div class="ctrl-label">Upload Your Own</div>
    <label class="upload-btn">
      <input type="file" accept="image/*" onchange="uploadDesign(event)">
      🎨 Upload design / logo
    </label>
    <label class="upload-btn" style="border-color:#555;color:#aaa;margin-top:8px;">
      <input type="file" accept="image/*" onchange="uploadProduct(event)">
      📦 Upload your product photo
    </label>
    <div id="status"></div>
  </div>

  <button onclick="downloadMockup()">↓ Download PNG</button>

</div>

<script>
// ── PRODUCT DEFINITIONS ────────────────────────────────────────────
// printZone: { x, y, w, h } as fraction of 500px canvas
const PRODUCTS = {
  tshirt: {
    svg: 'tshirt.svg',
    // jersey 4-colour only flag
    jerseyColors: false,
    zone: { x: 0.30, y: 0.26, w: 0.40, h: 0.36 },
    colors: ['#ffffff','#111111','#1a2a5e','#c0392b','#2e7d32','#2196f3','#f5e6c8','#808080'],
  },
  hoodie: {
    svg: 'hoodie.svg',
    jerseyColors: false,
    zone: { x: 0.30, y: 0.35, w: 0.40, h: 0.30 },
    colors: ['#ffffff','#111111','#1a2a5e','#c0392b','#2e7d32','#808080'],
  },
  jersey: {
    svg: 'jersey.svg',
    jerseyColors: true,
    zone: { x: 0.27, y: 0.22, w: 0.46, h: 0.42 },
    colors: ['#ffffff','#111111','#1a2a5e','#c0392b'],  // Red White Blue Black only
  },
  cap: {
    svg: 'cap.svg',
    jerseyColors: false,
    zone: { x: 0.30, y: 0.26, w: 0.40, h: 0.28 },
    colors: ['#ffffff','#111111','#1a2a5e','#c0392b','#2e7d32','#808080'],
  },
  tote: {
    svg: 'tote.svg',
    jerseyColors: false,
    zone: { x: 0.28, y: 0.36, w: 0.44, h: 0.38 },
    colors: ['#ffffff','#f5e6c8','#111111','#1a2a5e'],
  },
  mug: {
    svg: 'mug.svg',
    jerseyColors: false,
    zone: { x: 0.22, y: 0.26, w: 0.46, h: 0.44 },
    colors: ['#ffffff','#111111','#1a2a5e','#c0392b','#2e7d32','#808080'],
  },
  banner: {
    svg: 'banner.svg',
    jerseyColors: false,
    zone: { x: 0.24, y: 0.06, w: 0.52, h: 0.82 },
    colors: ['#ffffff','#111111','#1a2a5e','#c0392b'],
  },
  flyer: {
    svg: 'flyer.svg',
    jerseyColors: false,
    zone: { x: 0.20, y: 0.06, w: 0.56, h: 0.86 },
    colors: ['#ffffff','#f5e6c8','#1a2a5e'],
  },
};

const COLOR_NAMES = {
  '#ffffff':'White','#111111':'Black','#1a2a5e':'Navy',
  '#c0392b':'Red','#2e7d32':'Forest Green','#2196f3':'Sky Blue',
  '#f5e6c8':'Cream','#808080':'Grey','#f39c12':'Yellow',
};

// ── SAMPLE SVG DESIGNS ─────────────────────────────────────────────
const SAMPLES = [
  // 0: Bold text
  `<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
    <rect width="400" height="200" fill="#e8622a" rx="10"/>
    <text x="200" y="118" font-family="Impact,Arial Black,sans-serif" font-size="80" fill="white" text-anchor="middle" letter-spacing="3">BRAND</text>
    <text x="200" y="160" font-family="Arial,sans-serif" font-size="22" fill="rgba(255,255,255,0.75)" text-anchor="middle" letter-spacing="8">YOUR NAME</text>
  </svg>`,
  // 1: Circle badge
  `<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
    <circle cx="150" cy="150" r="142" fill="#1a2a5e" stroke="white" stroke-width="8"/>
    <circle cx="150" cy="150" r="115" fill="none" stroke="white" stroke-width="2"/>
    <text x="150" y="140" font-family="Impact,Arial Black,sans-serif" font-size="48" fill="white" text-anchor="middle">TEAM</text>
    <text x="150" y="185" font-family="Impact,Arial Black,sans-serif" font-size="30" fill="#e8622a" text-anchor="middle">KISUMU</text>
    <text x="150" y="215" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.65)" text-anchor="middle" letter-spacing="5">EST. 2024</text>
  </svg>`,
  // 2: Shield
  `<svg xmlns="http://www.w3.org/2000/svg" width="280" height="320" viewBox="0 0 280 320">
    <path d="M140 8 L268 58 L268 182 Q268 278 140 312 Q12 278 12 182 L12 58 Z" fill="#2e7d32" stroke="white" stroke-width="6"/>
    <path d="M140 28 L248 70 L248 182 Q248 262 140 292 Q32 262 32 182 L32 70 Z" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
    <text x="140" y="160" font-family="Impact,Arial Black,sans-serif" font-size="56" fill="white" text-anchor="middle">JP</text>
    <text x="140" y="210" font-family="Arial,sans-serif" font-size="15" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="3">JANTA PRINTS</text>
  </svg>`,
];

// ── STATE ──────────────────────────────────────────────────────────
const state = {
  product: 'tshirt',
  color: '#ffffff',
  productImg: null,      // HTMLImageElement — the SVG product
  customProduct: null,   // canvas — user's own product photo
  designCanvas: null,    // canvas — the design to place in zone
  activeSample: -1,
};

const canvas = document.getElementById('mc');
const ctx = canvas.getContext('2d');
const SIZE = 500;

// ── INIT ───────────────────────────────────────────────────────────
function init() {
  selectProduct('tshirt');
}

// ── SELECT PRODUCT ─────────────────────────────────────────────────
function selectProduct(key) {
  state.product = key;
  state.color = PRODUCTS[key].colors[0];
  state.customProduct = null;  // clear custom product when switching
  buildSwatches();
  loadProductSVG(key, render);
}

function buildSwatches() {
  const prod = PRODUCTS[state.product];
  const row = document.getElementById('swatchRow');
  row.innerHTML = '';
  prod.colors.forEach(function(hex) {
    const d = document.createElement('div');
    d.className = 'swatch' + (hex === state.color ? ' active' : '');
    d.style.background = hex;
    d.style.border = hex === '#ffffff' ? '3px solid #555' : '3px solid transparent';
    d.title = COLOR_NAMES[hex] || hex;
    d.onclick = function() {
      state.color = hex;
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      d.classList.add('active');
      render();
    };
    row.appendChild(d);
  });
}

// ── LOAD SVG ───────────────────────────────────────────────────────
// Returns a coloured SVG as an Image element
function loadProductSVG(key, cb) {
  const prod = PRODUCTS[key];
  const svgPath = '../images/mockup/' + prod.svg;

  fetch(svgPath)
    .then(function(r) { return r.text(); })
    .then(function(svgText) {
      // Colour the product: swap fill on product-body, product-sleeve-*, product-collar etc
      const colored = colourSVG(svgText, state.color);
      const blob = new Blob([colored], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = function() {
        URL.revokeObjectURL(url);
        state.productImg = img;
        cb();
      };
      img.onerror = function() {
        console.error('SVG load error for', svgPath);
      };
      img.src = url;
    })
    .catch(function(e) {
      console.error('Fetch failed:', e);
      // Fallback: just render with placeholder
      state.productImg = null;
      cb();
    });
}

// ── COLOUR SVG ─────────────────────────────────────────────────────
function colourSVG(svgText, hex) {
  // Replace fills on product-body, sleeves, hood, handle
  // Strategy: replace the fill="#ffffff" on id="product-*" elements
  // Parse as DOM for reliability
  const parser = new DOMParser();
  const doc = parser.parseFromString(svgText, 'image/svg+xml');

  // Elements to recolour
  const primaryIds = ['product-body','product-sleeve-l','product-sleeve-r','product-hood','product-handle'];
  const collarIds  = ['product-collar','product-brim'];

  primaryIds.forEach(function(id) {
    const el = doc.getElementById(id);
    if (el) {
      el.setAttribute('fill', hex);
      // Adjust stroke to be slightly darker version
      el.setAttribute('stroke', darken(hex, 0.15));
    }
  });

  // Collar/brim — slightly darker shade of main colour
  collarIds.forEach(function(id) {
    const el = doc.getElementById(id);
    if (el) el.setAttribute('fill', darken(hex, 0.10));
  });

  return new XMLSerializer().serializeToString(doc.documentElement);
}

function darken(hex, amount) {
  // Simple darken — won't work for pure black, handle gracefully
  if (hex === '#111111') return '#0a0a0a';
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const dr = Math.max(0, Math.round(r * (1 - amount)));
  const dg = Math.max(0, Math.round(g * (1 - amount)));
  const db = Math.max(0, Math.round(b * (1 - amount)));
  return '#' + dr.toString(16).padStart(2,'0') + dg.toString(16).padStart(2,'0') + db.toString(16).padStart(2,'0');
}

// ── RENDER ─────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, SIZE, SIZE);

  // 1. Light background
  ctx.fillStyle = '#f0f0f0';
  ctx.fillRect(0, 0, SIZE, SIZE);

  // 2. Product base — either custom photo or SVG illustration
  if (state.customProduct) {
    // Draw user's own product photo, centered, aspect-fit
    const cp = state.customProduct;
    const ratio = Math.min(SIZE / cp.width, SIZE / cp.height) * 0.92;
    const dw = cp.width * ratio;
    const dh = cp.height * ratio;
    const dx = (SIZE - dw) / 2;
    const dy = (SIZE - dh) / 2;
    ctx.drawImage(cp, dx, dy, dw, dh);
  } else if (state.productImg) {
    // Reload SVG with current colour then draw
    const prod = PRODUCTS[state.product];
    fetch('../images/mockup/' + prod.svg)
      .then(r => r.text())
      .then(function(svgText) {
        const colored = colourSVG(svgText, state.color);
        const blob = new Blob([colored], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = function() {
          URL.revokeObjectURL(url);
          ctx.clearRect(0, 0, SIZE, SIZE);
          ctx.fillStyle = '#f0f0f0';
          ctx.fillRect(0, 0, SIZE, SIZE);
          ctx.drawImage(img, 0, 0, SIZE, SIZE);
          drawDesign();
        };
        img.src = url;
      });
    return; // async — drawDesign called inside
  }

  drawDesign();
}

// ── DRAW DESIGN ONTO PRINT ZONE ────────────────────────────────────
function drawDesign() {
  if (!state.designCanvas) return;

  const prod = PRODUCTS[state.product];
  const z = prod.zone;

  // Convert zone fractions to pixels
  const zx = z.x * SIZE;
  const zy = z.y * SIZE;
  const zw = z.w * SIZE;
  const zh = z.h * SIZE;

  // Fit design canvas into zone maintaining aspect ratio
  const dc = state.designCanvas;
  const ratio = Math.min(zw / dc.width, zh / dc.height);
  const dw = dc.width * ratio;
  const dh = dc.height * ratio;
  const dx = zx + (zw - dw) / 2;
  const dy = zy + (zh - dh) / 2;

  // Clip to print zone so design doesn't bleed outside
  ctx.save();
  ctx.beginPath();
  ctx.rect(zx, zy, zw, zh);
  ctx.clip();
  ctx.drawImage(dc, dx, dy, dw, dh);
  ctx.restore();
}

// ── SAMPLE LOGOS ───────────────────────────────────────────────────
function applySample(index) {
  document.querySelectorAll('.sample-btn').forEach((b, i) => {
    b.classList.toggle('active', i === index);
  });
  state.activeSample = index;
  svgToCanvas(SAMPLES[index], function(c) {
    state.designCanvas = c;
    setStatus('Sample design applied');
    render();
  });
}

function svgToCanvas(svgStr, cb) {
  const blob = new Blob([svgStr], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = function() {
    const c = document.createElement('canvas');
    c.width = img.naturalWidth || 400;
    c.height = img.naturalHeight || 400;
    c.getContext('2d').drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    cb(c);
  };
  img.onerror = function() { console.error('SVG sample load error'); };
  img.src = url;
}

// ── FILE UPLOADS ───────────────────────────────────────────────────
function uploadDesign(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() {
      const c = document.createElement('canvas');
      c.width = img.width; c.height = img.height;
      c.getContext('2d').drawImage(img, 0, 0);
      state.designCanvas = c;
      // Clear active sample
      document.querySelectorAll('.sample-btn').forEach(b => b.classList.remove('active'));
      state.activeSample = -1;
      setStatus('Design: ' + file.name);
      render();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function uploadProduct(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() {
      const c = document.createElement('canvas');
      c.width = img.width; c.height = img.height;
      c.getContext('2d').drawImage(img, 0, 0);
      state.customProduct = c;
      setStatus('Product: ' + file.name);
      render();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ── DOWNLOAD ───────────────────────────────────────────────────────
function downloadMockup() {
  render(); // ensure latest
  setTimeout(function() {
    const link = document.createElement('a');
    link.download = 'janta-prints-mockup.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }, 100);
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// ── START ──────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
